{% extends "base.html" %}
{% block title %}Create Account — Budget Parser{% endblock %}
{% block content %}
<div class="auth-card">
    <h1 class="auth-title">Create Account</h1>

    {% if error %}
    <p class="auth-error" role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <a href="{{ url_for('auth.google_login') }}" class="btn-google">Sign up with Google</a>

    <p class="auth-links">
        Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
</div>
{% endblock %}
