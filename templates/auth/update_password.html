{% extends "base.html" %}
{% block title %}Set New Password — Budget Parser{% endblock %}
{% block content %}
<div class="auth-card">
    <h1 class="auth-title">Set New Password</h1>

    {% if error %}
    <p class="auth-error" role="alert">{{ error }}</p>
    <p class="auth-links">
        <a href="{{ url_for('auth.reset_password') }}">Request a new reset link</a>
    </p>
    {% else %}
    <form method="post" action="{{ url_for('auth.update_password_view') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary">Update Password</button>
    </form>

    <p class="auth-links">
        <a href="{{ url_for('auth.login') }}">Back to Sign In</a>
    </p>
    {% endif %}
</div>
{% endblock %}
