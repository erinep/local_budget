<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Budget Parser{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{{ url_for('home.index') }}">
                <span class="brand-mark">BP</span>
                <span class="brand-text">Budget Parser</span>
            </a>
            {% if g.user %}
            <nav class="site-nav">
                <a class="nav-link" href="{{ url_for('account_settings.index') }}">Settings</a>
                <span class="nav-email">{{ g.user.email }}</span>
                <a class="nav-link" href="{{ url_for('auth.logout') }}">Sign out</a>
            </nav>
            {% endif %}
        </header>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
