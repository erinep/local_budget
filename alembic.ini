# Alembic configuration file.
# ADR-0007: Alembic is the single migration tool. Never apply raw SQL to prod.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template for new migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in generated migration files.
timezone = UTC

# Database URL is read from the DATABASE_URL environment variable at runtime.
# Do NOT hard-code credentials here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
